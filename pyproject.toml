# ---------------------------------------------------------------------------
# Build system
# ---------------------------------------------------------------------------

[build-system]
requires = ["uv_build<1.0.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = "."

[tool.uv]
package = true

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------

[project]
name = "rero-ils"
version = "1.28.0"
description = "The elegant solution for heritage, public and school libraries or networks."
authors = [{name = "RERO+", email = "software@rero.ch"}]
keywords = ["rero-ils", "invenio", "integrated library system"]
license = "AGPL-3.0-or-later"
urls = {homepage = "https://www.rero.ch/en/products/ils", repository="https://github.com/rero/rero-ils"}
requires-python = ">=3.14,<3.15"

dependencies = [
    ## Third party invenio modules used by RERO ILS
    "invenio-oaiharvester>=1.0.0a4",
    "invenio-circulation>=4.0.0",
    "invenio-search[elasticsearch7]>=3.0.0",
    # Invenio core modules
    "invenio-app>=3.0.0",
    "invenio-base>=2.0.0",
    "invenio-celery>=2.0.2",
    "invenio-config>=1.0.3",
    "invenio-i18n>=3.4.2",
    "invenio-db[postgresql]>=2.0.0",
    # Invenio base bundle
    "invenio-admin>=1.6.0",
    "invenio-assets>=4.0.0",
    "invenio-formatter>=3.0.0",
    "invenio-logging[sentry]>=4.0.0",
    "invenio-mail>=2.0.0",
    "invenio-rest>=3.0.0",
    "invenio-theme>=4.0.0",
    # Invenio auth bundle
    "invenio-access>=4.0.0",
    "invenio-accounts>=6.0.0",
    "invenio-oauth2server>=3.0.0",
    "invenio-oauthclient>=5.0.0",
    # Invenio metadata bundle
    "invenio-indexer>=4.0.0",
    "invenio-jsonschemas>=2.0.0",
    "invenio-oaiserver>=4.0.0",
    "invenio-pidstore>=3.0.0",
    "invenio-records-rest>=3.0.0",
    "invenio-records-ui>=2.0.0",
    "invenio-records>=4.0.0",
    "invenio-search-ui>=4.0.0",
    "invenio-records-permissions>=0.13.0",
    "python-dotenv>=0.13.0",
    "sentry-sdk",
    "dojson>=1.4.0",
    ## RERO specific python modules
    "rero-invenio-base>=0.3.0",
    "rero-invenio-files>=1.0.0",
    "rero-invenio-thumbnails>=1.0.0",
    "flask-wiki>=1.0.0",
    ## RERO ILS specific python modules
    "PyYAML>=5.3.1",
    "dateparser>=1.1.1",
    "isbnlib>=3.9.1",
    "requests>=2.23.0",
    "polib",
    "xmltodict",
    "ciso8601",
    ## Third party modules used by RERO ILS
    "lazyreader>=1.0.0",
    "jinja2>2.11.2",
    "jsonmerge>=1.8.0",
    "num2words>=0.5.10",
    "iso639>=0.1.4",
    "dcxml>=0.1.2",
    "DeepDiff>=5.5.0",
    "jsonresolver",
    # needed for elasticsearch 7.13.4
    "urllib3<2.0.0",
    "dnspython>=2.4.2",
    "babel>=2.16.0",
    "levenshtein>=0.26.0",
    "unidecode>=1.3.8",
    "poethepoet",
    "sqlalchemy-celery-beat>=0.8.3",
    "bootstrap-flask>=2.5.0",
    "flask-admin>=1.6.1",
    "invenio-sip2>=0.6.25",
    "markdown-captions>=2.1.2",
]

[dependency-groups]
dev = [
    ## Default from Invenio
    "pytest-invenio>=3.0.0",
    "coveralls>=4.0.1",
    "Flask-Debugtoolbar>=0.10.1",
    ## RERO ILS specific python packages
    "freezegun>=1.1.0",
    "pip-audit>=2.8.0",
    "ruff>=0.12.8",
    "pytest-ruff>=0.5",
    "python-semantic-release>=10.5.3",
]
prod = [
    "uwsgi>=2.0.30",
    "uwsgitop>=0.11",
]

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------

[project.entry-points."app.console_scripts"]
rero-ils = "invenio_app.cli:cli"

[project.entry-points."babel.extractors"]
json = "rero_ils.modules.babel_extractors:extract_json"

[project.entry-points."dojson.cli"]
head = "rero_ils.dojson.cli:head"
reverse = "rero_ils.dojson.cli:reverse"

[project.entry-points."dojson.cli.dump"]
pjson = "rero_ils.dojson.cli:pretty_json_dump"

[project.entry-points."dojson.cli.rule"]
marc21_dnb_to_json = "rero_ils.modules.documents.dojson.contrib.marc21tojson:marc21_dnb"
marc21_kul_to_json = "rero_ils.modules.documents.dojson.contrib.marc21tojson:marc21_kul"
marc21_loc_to_json = "rero_ils.modules.documents.dojson.contrib.marc21tojson:marc21_loc"
